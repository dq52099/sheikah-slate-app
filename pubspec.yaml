name: sheikah_slate
description: Sheikah Slate - Materialize the world.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  webview_flutter: ^4.4.2
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  path_provider: ^2.1.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
  assets:
    - assets/runes/

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.24
